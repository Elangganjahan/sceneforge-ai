<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SceneForge AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.hero{
  text-align:center;
  padding:30px 10px;
}

.hero img{
  width:140px;
  border-radius:12px;
  filter: drop-shadow(0 0 18px rgba(34,197,94,0.6));
}

h1{
  margin:10px 0 5px;
}

.subtitle{
  color:#94a3b8;
  margin-bottom:20px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

input, textarea, select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
  background:#111827;
  color:white;
}

button{
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.btn{
  background:#22c55e;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
  margin-top:20px;
}

.card{
  background:#111827;
  padding:10px;
  border-radius:10px;
}

.card img{
  width:100%;
  border-radius:8px;
}

.small{
  font-size:12px;
  color:#94a3b8;
}
</style>
</head>

<body>

<!-- 🔥 LOGO (PASTIKAN ADA logo.png) -->
<div class="hero">
  <img src="logo.png">
  <h1>SceneForge AI</h1>
  <div class="subtitle">AI Film Generator — Story to Video</div>
</div>

<div class="container">

<input id="title" placeholder="Judul">
<input id="genre" placeholder="Genre">
<input id="setting" placeholder="Setting">
<textarea id="story" placeholder="Cerita"></textarea>

<select id="ratio">
  <option value="16:9">16:9 Cinematic</option>
  <option value="9:16">9:16 TikTok</option>
</select>

<button class="btn" onclick="generate()">🎬 Generate</button>

<div id="output" class="grid"></div>

</div>

<script>

function img(prompt){
  return "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);
}

const scenes=[
"establishing cinematic wide shot",
"character introduction",
"important object reveal",
"tension rising",
"conflict starts",
"emotional close up",
"plot twist moment",
"climax action scene",
"ending cinematic frame"
];

function generate(){

  const genre=document.getElementById("genre").value;
  const setting=document.getElementById("setting").value;
  const story=document.getElementById("story").value;
  const ratio=document.getElementById("ratio").value;

  const base=genre+", "+setting+", "+story;

  let out=document.getElementById("output");
  out.innerHTML="";

  scenes.forEach((s,i)=>{

    let prompt=`
cinematic film still, ultra realistic, aspect ratio ${ratio},
story: ${base},
scene: ${s},
dramatic lighting, 4k, film grain
`;

    let card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${img(prompt)}">
      <div class="small">SHOT ${i+1}: ${s}</div>
    `;

    out.appendChild(card);
  });
}

</script>

</body>
</html>
