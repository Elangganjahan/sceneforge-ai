<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SceneForge AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#111827,#0b1220);
  color:white;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px 10px;
}

.hero img{
  width:140px;
  animation:float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px #22c55e);
}

@keyframes float{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0px);}
}

h1{
  margin:10px 0 5px;
  font-size:40px;
}

.subtitle{
  color:#94a3b8;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* INPUT STYLE */
input,textarea,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #1f2937;
  background:rgba(17,24,39,0.8);
  color:white;
  outline:none;
}

/* BUTTON */
button{
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  transform:scale(1.03);
}

.btn{
  background:linear-gradient(90deg,#22c55e,#16a34a);
  color:white;
  width:100%;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:12px;
  margin-top:20px;
}

.card{
  background:rgba(17,24,39,0.9);
  border:1px solid #1f2937;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.02);
}

.card img{
  width:100%;
  display:block;
}

.small{
  padding:10px;
  font-size:12px;
  color:#94a3b8;
}

/* LOADING */
.loading{
  display:none;
  text-align:center;
  color:#38bdf8;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="logo.png">
  <h1>SceneForge AI</h1>
  <div class="subtitle">AI Film Director Studio — Story to Cinematic Video</div>
</div>

<div class="container">

<input id="genre" placeholder="Genre (action, horror, dll)">
<input id="setting" placeholder="Setting cerita">
<textarea id="story" placeholder="Cerita / prompt"></textarea>

<select id="ratio">
  <option value="16:9">16:9 Cinematic</option>
  <option value="9:16">9:16 TikTok</option>
</select>

<button class="btn" onclick="generate()">🎬 Generate AI Film</button>

<div class="loading" id="loading">⏳ AI sedang membuat film kamu...</div>

<div id="output" class="grid"></div>

</div>

<script>

function img(prompt){
  return "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);
}

const scenes=[
"establishing cinematic wide shot",
"character introduction emotional",
"important object reveal dramatic lighting",
"tension rising atmosphere",
"conflict begins action scene",
"emotional close-up face",
"turning point dramatic twist",
"climax high intensity action",
"ending cinematic resolution"
];

function generate(){

  document.getElementById("loading").style.display="block";

  const genre=document.getElementById("genre").value;
  const setting=document.getElementById("setting").value;
  const story=document.getElementById("story").value;
  const ratio=document.getElementById("ratio").value;

  const base=`${genre}, ${setting}, ${story}`;

  let out=document.getElementById("output");
  out.innerHTML="";

  setTimeout(()=>{

    scenes.forEach((s,i)=>{

      let prompt=`
cinematic film still, ultra realistic, 4k, film grain,
aspect ratio ${ratio},
story: ${base},
scene: ${s},
dramatic lighting, professional film composition
`;

      let card=document.createElement("div");
      card.className="card";

      card.innerHTML=`
        <img src="${img(prompt)}">
        <div class="small">SHOT ${i+1} — ${s}</div>
      `;

      out.appendChild(card);
    });

    document.getElementById("loading").style.display="none";

  },1200);
}

</script>

</body>
</html>
